    <rect x="270" y="150" width="6" height="280"/>
    <rect x="280" y="240" width="6" height="100"/>
    <!-- área central (300–420) fica atrás do MMU, mas mantemos as barras -->
    <rect x="290" y="180" width="6" height="220"/>
    <rect x="300" y="220" width="6" height="140"/>
    <rect x="310" y="170" width="6" height="240"/>
    <rect x="320" y="240" width="6" height="100"/>
    <rect x="330" y="200" width="6" height="180"/>
