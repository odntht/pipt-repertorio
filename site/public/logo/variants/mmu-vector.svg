  <!-- Texto "MMU" grande, branco, sans-serif condensado (Arial Black / Impact fallback) -->
  <text x="320" y="330"
        text-anchor="middle"
        font-family="'Arial Black', 'Helvetica Neue', Impact, sans-serif"
        font-weight="900"
        font-size="200"
        fill="#FFFFFF"
        letter-spacing="-2">MMU</text>

  <!-- Subtítulo -->
  <text x="320" y="500"
        text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="600"
        font-size="26"
        fill="#FFFFFF"
        letter-spacing="4">MINISTÉRIO DE MÚSICA</text>
  <text x="320" y="535"
        text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="600"
        font-size="26"
        fill="#FFFFFF"
        letter-spacing="4">PIPT</text>
